<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Home Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <!-- Radio buttons for rooms -->
    <input type="radio" name="room" id="kitchen-tab" checked>
    <input type="radio" name="room" id="bedroom-tab">
    <input type="radio" name="room" id="mainroom-tab">

    <!-- Sidebar -->
    <aside class="sidebar">
        <h2>🏠 Kirabo's Home</h2>
        <label for="kitchen-tab">🍳 Kitchen</label>
        <label for="bedroom-tab">🛏️ Bedroom + 🚿 Bathroom</label>
        <label for="mainroom-tab">🛋️ Main Room</label>
    </aside>

    <!-- Main Content -->
    <main class="main">
        <h1>Dashboard</h1>

        <!-- Kitchen Room -->
        <div class="room kitchen">
            <h2>🍳 Kitchen</h2>
            <div class="cards">
                <div class="card">
                    <h3>💡 Light</h3>
                    <input type="checkbox" id="kitchen-light">
                    <label for="kitchen-light" class="toggle"></label>
                    <p class="status">
                        <span class="off">OFF</span>
                        <span class="on">ON</span>
                    </p>
                </div>
                <div class="card">
                    <h3>🔌 Socket</h3>
                    <input type="checkbox" id="kitchen-socket">
                    <label for="kitchen-socket" class="toggle"></label>
                    <p class="status">
                        <span class="off">OFF</span>
                        <span class="on">ON</span>
                    </p>
                </div>
            </div>
        </div>

        <!-- Bedroom + Bathroom Room -->
        <div class="room bedroom">
            <h2>🛏️ Bedroom + 🚿 Bathroom</h2>
            <div class="cards">
                <div class="card">
                    <h3>💡 Light</h3>
                    <input type="checkbox" id="bedroom-light">
                    <label for="bedroom-light" class="toggle"></label>
                    <p class="status">
                        <span class="off">OFF</span>
                        <span class="on">ON</span>
                    </p>
                </div>
                <div class="card">
                    <h3>🌀 Fan</h3>
                    <input type="checkbox" id="bedroom-fan">
                    <label for="bedroom-fan" class="toggle"></label>
                    <p class="status">
                        <span class="off">OFF</span>
                        <span class="on">ON</span>
                    </p>
                </div>
            </div>
        </div>

        <!-- Main Room -->
        <div class="room mainroom">
            <h2>🛋️ Main Room</h2>
            <div class="cards">
                <div class="card">
                    <h3>📺 TV</h3>
                    <input type="checkbox" id="main-tv">
                    <label for="main-tv" class="toggle"></label>
                    <p class="status">
                        <span class="off">OFF</span>
                        <span class="on">ON</span>
                    </p>
                </div>
                <div class="card">
                    <h3>❄ AC</h3>
                    <input type="checkbox" id="main-ac">
                    <label for="main-ac" class="toggle"></label>
                    <p class="status">
                        <span class="off">OFF</span>
                        <span class="on">ON</span>
                    </p>
                </div>
                <div class="card">
                    <h3>🚪 Door Lock</h3>
                    <input type="checkbox" id="main-door">
                    <label for="main-door" class="toggle"></label>
                    <p class="status">
                        <span class="off">OFF</span>
                        <span class="on">ON</span>
                    </p>
                </div>
            </div>
        </div>

        <!-- Environment Section -->
        <div class="environment">
            <h2>Environment</h2>
            <p>🌡 Temperature: 25°C</p>
            <p>💧 Humidity: 60%</p>
        </div>

    </main>

</div>

</body>
</html>
